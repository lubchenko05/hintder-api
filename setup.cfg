[isort]
profile = black
skip = alembic
force_alphabetical_sort_within_sections = true
order_by_type = false
combine_as_imports = true

[flake8]
enable-extensions = G
inline-quotes = "
multiline-quotes = "
max-line-length = 100
# Relative imports are banned project-wide — always import from the ``hintder``
# package root so module moves don't silently break siblings.
ban-relative-imports = true
# W503 + E203 are PEP 8 / black compatibility ignores (black formats slices
# as ``[a : b]`` and breaks lines before operators; flake8 disagrees with
# both). B008 is required for FastAPI ``Depends()`` defaults.
#
# Docstring rules (flake8-docstrings / pydocstyle ``D``):
#   D105 — magic methods don't need docstrings
#   D107 — ``__init__`` documented at class level instead
#   D203 — conflicts with D211 (no blank line before class docstring)
#   D213 — conflicts with D212 (summary on first line)
#   D401 — imperative-mood nit, too noisy
ignore = W503, E203, B008, D105, D107, D203, D213, D401
exclude = alembic, .venv, venv
docstring-convention = pep257
per-file-ignores =
    # __init__ files are re-export shims; module docstring is enough.
    dating/*/__init__.py:D104
    tests/*:D100,D101,D102,D103,D104

[mypy]
python_version = 3.12
check_untyped_defs = True
disallow_any_generics = True
disallow_untyped_calls = True
disallow_untyped_defs = True
follow_imports = silent
ignore_missing_imports = True
plugins = pydantic.mypy
show_error_codes = True
strict_optional = True
warn_redundant_casts = True
warn_unused_ignores = True

[mypy-tests.*]
ignore_errors = True

# Third-party SDKs without complete type stubs. ``disallow_untyped_calls``
# would otherwise flag every call into these libraries — none of which we
# can fix upstream.
[mypy-firebase_admin.*]
disallow_untyped_calls = False
[mypy-google.cloud.*]
disallow_untyped_calls = False
[mypy-google.genai.*]
disallow_untyped_calls = False
[mypy-google.*]
disallow_untyped_calls = False
# Caller module that drives the GCP / google-genai SDKs — turn off the strict
# untyped-call check here (mirrors the bitepal/seeto pattern).
[mypy-dating.services.ai]
disallow_untyped_calls = False
# Drives the google-cloud-storage SDK. ``google.cloud`` is a namespace package,
# so the storage import trips attr-defined; untyped bucket handles trip calls.
[mypy-dating.services.storage]
disallow_untyped_calls = False
disable_error_code = attr-defined

[tool:pytest]
pythonpath = .
testpaths = tests
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
